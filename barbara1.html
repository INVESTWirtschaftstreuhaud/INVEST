<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Barbara</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Tenor+Sans&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --cream: #f5f0e8;
      --sand: #e8dfd0;
      --warm-brown: #5c4a35;
      --dark-brown: #2e1f0f;
      --accent: #b07d50;
      --line: #c8b89a;
    }

    body {
      background-color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      color: var(--dark-brown);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 80px 100px;
      animation: fadeUp 1.2s ease both;
      max-width: 680px;
      width: 100%;
    }

    .top-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 48px;
      animation: fadeUp 1s ease 0.2s both;
    }

    .line-short {
      width: 60px;
      height: 1px;
      background: var(--line);
    }

    .diamond {
      width: 7px;
      height: 7px;
      background: var(--accent);
      transform: rotate(45deg);
    }

    .label {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      animation: fadeUp 1s ease 0.3s both;
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 40px auto;
      animation: fadeUp 1s ease 0.55s both;
    }

    .divider-line {
      flex: 1;
      max-width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--line));
    }

    .divider-line.right {
      background: linear-gradient(to left, transparent, var(--line));
    }

    .divider-text {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--line);
    }

    .contact-block {
      animation: fadeUp 1s ease 0.65s both;
    }

    .contact-label {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--warm-brown);
      margin-bottom: 12px;
    }

    .contact-link {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 22px;
      letter-spacing: 0.05em;
      color: var(--dark-brown);
      text-decoration: none;
      position: relative;
      transition: color 0.3s ease;
    }

    .contact-link::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.4s ease;
    }

    .contact-link:hover { color: var(--accent); }
    .contact-link:hover::after { width: 100%; }

    .bottom-ornament {
      margin-top: 52px;
      animation: fadeUp 1s ease 0.75s both;
    }

    .corner-tl,
    .corner-tr,
    .corner-bl,
    .corner-br {
      position: fixed;
      width: 40px;
      height: 40px;
      border-color: var(--line);
      border-style: solid;
      border-width: 0;
      opacity: 0.6;
      animation: fadeIn 1.5s ease both;
    }

    .corner-tl { top: 32px; left: 32px; border-top-width: 1px; border-left-width: 1px; }
    .corner-tr { top: 32px; right: 32px; border-top-width: 1px; border-right-width: 1px; }
    .corner-bl { bottom: 32px; left: 32px; border-bottom-width: 1px; border-left-width: 1px; }
    .corner-br { bottom: 32px; right: 32px; border-bottom-width: 1px; border-right-width: 1px; }

    /* ── Contact Form ── */
    .form-section {
      margin-top: 8px;
      animation: fadeUp 1s ease 0.7s both;
      text-align: left;
    }

    .form-title {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--line);
      text-align: center;
      margin-bottom: 28px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-field.full {
      grid-column: 1 / -1;
    }

    .form-field label {
      font-family: 'Tenor Sans', sans-serif;
      font-size: 8.5px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--warm-brown);
    }

    .form-field input,
    .form-field textarea {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      padding: 8px 2px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-weight: 300;
      color: var(--dark-brown);
      outline: none;
      transition: border-color 0.3s ease;
      width: 100%;
    }

    .form-field input::placeholder,
    .form-field textarea::placeholder {
      color: var(--line);
      font-style: italic;
    }

    .form-field input:focus,
    .form-field textarea:focus {
      border-bottom-color: var(--accent);
    }

    .form-field textarea {
      resize: none;
      height: 100px;
      line-height: 1.6;
    }

    .form-submit {
      margin-top: 28px;
      text-align: center;
    }

    .btn-send {
      display: inline-block;
      font-family: 'Tenor Sans', sans-serif;
      font-size: 9px;
      letter-spacing: 0.42em;
      text-transform: uppercase;
      color: var(--accent);
      background: transparent;
      border: 1px solid var(--line);
      padding: 14px 40px;
      cursor: pointer;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .btn-send:hover {
      border-color: var(--accent);
      color: var(--cream);
      background: var(--accent);
    }

    .form-success {
      display: none;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 18px;
      color: var(--warm-brown);
      text-align: center;
      margin-top: 16px;
      padding: 16px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 0.6; }
    }

    @media (max-width: 600px) {
      .card { padding: 60px 28px; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>

  <main class="card">

    <div class="top-ornament">
      <div class="line-short"></div>
      <div class="diamond"></div>
      <div class="line-short"></div>
    </div>

    <p class="label">Barbara Themel</p>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Kontakt</span>
      <div class="divider-line right"></div>
    </div>

    <div class="contact-block">
      <p class="contact-label"></p>
      <a class="contact-link" href="https://www.themel.co.at" target="_blank">www.themel.co.at</a>
    </div>

    <div class="contact-block">
      <p class="contact-label"></p>
      <a class="contact-link" href="https://www.invest-wirtschaftstreuhand.at" target="_blank">www.invest-wirtschaftstreuhand.at</a>
    </div>

    <div class="contact-block">
      <p class="contact-label"></p>
      <a class="contact-link" href="https://www.steurberatungvillach.at" target="_blank">www.steurberatungvillach.at</a>
    </div>

    <div class="contact-block">
      <p class="contact-label"></p>
      <a class="contact-link" href="https://www.feo.at" target="_blank">www.feo.at</a>
    </div>

    <!-- Contact Form -->
    <div class="divider" style="margin-top: 52px;">
      <div class="divider-line"></div>
      <span class="divider-text">Kontaktieren Sie uns</span>
      <div class="divider-line right"></div>
    </div>

    <div class="form-section">
      <form id="contactForm" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <!-- Hidden field to set recipient -->
        <input type="hidden" name="_replyto" value="barbarathemel@co.at">
        <input type="hidden" name="_subject" value="Neue Anfrage von Ihrer Website">

        <div class="form-grid">
          <div class="form-field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Ihr Name" required />
          </div>
          <div class="form-field">
            <label for="email">E-Mail</label>
            <input type="email" id="email" name="email" placeholder="ihre@email.com" required />
          </div>
          <div class="form-field full">
            <label for="phone">Telefonnummer</label>
            <input type="tel" id="phone" name="phone" placeholder="+43 ..." />
          </div>
          <div class="form-field full">
            <label for="message">Nachricht</label>
            <textarea id="message" name="message" placeholder="Wie kann ich Ihnen helfen?" required></textarea>
          </div>
        </div>

        <div class="form-submit">
          <button type="submit" class="btn-send">Anfrage senden</button>
        </div>

        <div class="form-success" id="formSuccess">
          Vielen Dank — Ihre Nachricht wurde gesendet. Ich melde mich bald bei Ihnen.
        </div>
      </form>
    </div>

    <div class="bottom-ornament">
      <div class="top-ornament" style="margin-bottom:0; margin-top:0;">
        <div class="line-short"></div>
        <div class="diamond"></div>
        <div class="line-short"></div>
      </div>
    </div>

  </main>

  <script>
    const form = document.getElementById('contactForm');
    const success = document.getElementById('formSuccess');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      const data = new FormData(form);
      const response = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        body: JSON.stringify({
          access_key: 'YOUR_WEB3FORMS_KEY',
          name: data.get('name'),
          email: data.get('email'),
          phone: data.get('phone'),
          message: data.get('message'),
          to: 'barbarathemel@co.at',
          subject: 'Neue Anfrage von Ihrer Website'
        }),
        headers: { 'Content-Type': 'application/json' }
      });

      if (response.ok) {
        form.reset();
        success.style.display = 'block';
      }
    });
  </script>

</body>
</html>
